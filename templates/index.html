<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS CORE | V1.0</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --border: #262626;
            --text: #e5e5e5;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: ui-monospace, monospace;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .visual-split {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
        }

        .chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        [data-element="pie-chart"] {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(var(--border) 0% 100%);
            transition: background 0.3s ease;
            border: 4px solid var(--border);
        }

        [data-element="event-log"] {
            background: #000;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .log-item { padding: 4px 0; border-bottom: 1px solid #111; }
        .timestamp { color: #666; margin-right: 8px; }

        @media (max-width: 800px) {
            .grid, .visual-split { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>TMS_SYSTEM_CORE</div>
        <div data-status="connection" style="color: var(--green)">LINK_OK</div>
    </header>

    <div class="grid">
        <div class="card" data-sector="A">
            <h3>SECTOR_A</h3>
            <div class="stat-line" style="color: var(--green)"><span>PASS_G</span> <span data-value="GREEN">0</span></div>
            <div class="stat-line" style="color: var(--yellow)"><span>PASS_Y</span> <span data-value="YELLOW">0</span></div>
            <div class="stat-line" style="color: var(--red)"><span>VIOL_R</span> <span data-value="RED">0</span></div>
        </div>
        <div class="card" data-sector="B">
            <h3>SECTOR_B</h3>
            <div class="stat-line" style="color: var(--green)"><span>PASS_G</span> <span data-value="GREEN">0</span></div>
            <div class="stat-line" style="color: var(--yellow)"><span>PASS_Y</span> <span data-value="YELLOW">0</span></div>
            <div class="stat-line" style="color: var(--red)"><span>VIOL_R</span> <span data-value="RED">0</span></div>
        </div>
        <div class="card" data-sector="C">
            <h3>SECTOR_C</h3>
            <div class="stat-line" style="color: var(--green)"><span>PASS_G</span> <span data-value="GREEN">0</span></div>
            <div class="stat-line" style="color: var(--yellow)"><span>PASS_Y</span> <span data-value="YELLOW">0</span></div>
            <div class="stat-line" style="color: var(--red)"><span>VIOL_R</span> <span data-value="RED">0</span></div>
        </div>
    </div>

    <div class="visual-split">
        <div class="card chart-container">
            <h3>DISTRIBUTION</h3>
            <div data-element="pie-chart"></div>
        </div>
        <div class="card">
            <h3>EVENT_HISTORY</h3>
            <div data-element="event-log"></div>
        </div>
    </div>
</div>

<script>
    const stateCache = { GREEN: 0, YELLOW: 0, RED: 0 };
    
    const ui = {
        status: document.querySelector('[data-status="connection"]'),
        pie: document.querySelector('[data-element="pie-chart"]'),
        log: document.querySelector('[data-element="event-log"]'),
        sectors: {
            A: document.querySelector('[data-sector="A"]'),
            B: document.querySelector('[data-sector="B"]'),
            C: document.querySelector('[data-sector="C"]')
        }
    };

    async function syncTrafficData() {
        try {
            const response = await fetch('/data');
            const trafficData = await response.json();
            
            let aggregateStats = { green: 0, yellow: 0, red: 0 };

            Object.keys(ui.sectors).forEach(sectorId => {
                const source = trafficData[sectorId];
                const target = ui.sectors[sectorId];

                // Update text content safely
                target.querySelector('[data-value="GREEN"]').textContent = source.PASS_GREEN;
                target.querySelector('[data-value="YELLOW"]').textContent = source.PASS_YELLOW;
                target.querySelector('[data-value="RED"]').textContent = source.VIOLATION_RED;

                aggregateStats.green += source.PASS_GREEN;
                aggregateStats.yellow += source.PASS_YELLOW;
                aggregateStats.red += source.VIOLATION_RED;
            });

            updateVisualization(aggregateStats);
            processLogs(aggregateStats);

        } catch (error) {
            ui.status.textContent = 'LINK_LOST';
            ui.status.style.color = 'var(--red)';
        }
    }

    function updateVisualization(stats) {
        const total = stats.green + stats.yellow + stats.red;
        if (total === 0) return;

        const percGreen = (stats.green / total) * 100;
        const percYellow = (stats.yellow / total) * 100;

        ui.pie.style.background = `conic-gradient(
            var(--green) 0% ${percGreen}%, 
            var(--yellow) ${percGreen}% ${percGreen + percYellow}%, 
            var(--red) ${percGreen + percYellow}% 100%
        )`;
    }

    function processLogs(stats) {
        if (stats.green > stateCache.GREEN) appendLogEntry('PASS', 'VEHICLE_EXIT_GREEN', 'var(--green)');
        if (stats.yellow > stateCache.YELLOW) appendLogEntry('WARN', 'VEHICLE_EXIT_YELLOW', 'var(--yellow)');
        if (stats.red > stateCache.RED) appendLogEntry('CRIT', 'RED_LIGHT_VIOLATION', 'var(--red)');

        stateCache.GREEN = stats.green;
        stateCache.YELLOW = stats.yellow;
        stateCache.RED = stats.red;
    }

    function appendLogEntry(tag, message, themeColor) {
        const entry = document.createElement('div');
        entry.classList.add('log-item');

        const timestamp = document.createElement('span');
        timestamp.classList.add('timestamp');
        timestamp.textContent = new Date().toLocaleTimeString('en-GB');

        const label = document.createElement('span');
        label.style.color = themeColor;
        label.style.fontWeight = 'bold';
        label.textContent = `[${tag}] `;

        const body = document.createTextNode(message);

        entry.appendChild(timestamp);
        entry.appendChild(label);
        entry.appendChild(body);
        
        ui.log.prepend(entry);
    }

    setInterval(syncTrafficData, 1000);
</script>

</body>
</html>
